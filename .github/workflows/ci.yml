name: CI

on:
  push:
    branches: [main, main-with-dashboard]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: uv sync --extra dev
      - name: Run test suite
        run: uv run pytest -q

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          uv sync
          uv run python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (web/ only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install ruff
        run: uv sync --extra dev
      - name: Lint web directory
        run: uv run ruff check web/

  version-check:
    name: version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version changed
        run: |
          current_version=$(grep '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          main_version=$(git show main:pyproject.toml 2>/dev/null | grep '^version = ' | sed 's/version = "//;s/"//' || git show origin/main:pyproject.toml | grep '^version = ' | sed 's/version = "//;s/"//')
          if [ "$current_version" == "$main_version" ]; then
            echo "ERROR: Version not bumped. Expected change from $main_version"
            exit 1
          fi
          echo "Version bumped: $main_version -> $current_version"

  deploy-dev:
    name: deploy to dev (PR preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test, lint, smoke-install, version-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --environment staging --service gleaming-light
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}

  deploy-prod:
    name: deploy to production
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main-with-dashboard') && github.event_name == 'push'
    needs: [test, lint, smoke-install]
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --environment production --service gleaming-light
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}