name: CI

on:
  push:
    branches: [main, main-with-dashboard]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: uv sync --extra dev
      - name: Run test suite
        run: uv run pytest -q

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          uv sync
          uv run python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (web/ only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install ruff
        run: uv sync --extra dev
      - name: Lint web directory
        run: uv run ruff check web/

  version-check:
    name: version bump check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bump
        run: |
          set -euo pipefail

          BLOCKLIST="\.md$|docs/|LICENSE$|\.gitignore$|\.github/|\.yml$|\.yaml$|\.lock$|\.log$|\.env"

          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            TARGET_BRANCH="${GITHUB_REF#refs/heads/}"
            HEAD_COMMIT="$GITHUB_SHA"
          else
            TARGET_BRANCH="$GITHUB_BASE_REF"
            HEAD_COMMIT="$(git rev-parse HEAD)"
          fi

          BASE_COMMIT="$(git merge-base "origin/$TARGET_BRANCH" "$HEAD_COMMIT")"

          if [[ "$(git show "$HEAD_COMMIT:VERSION" 2>/dev/null)" == "$(git show "$BASE_COMMIT:VERSION" 2>/dev/null)" ]]; then
            CHANGED_FILES=$(git diff --name-only "$BASE_COMMIT" "$HEAD_COMMIT" || true)
            NEEDS_BUMP=false
            for file in $CHANGED_FILES; do
              if ! echo "$file" | grep -qE "$BLOCKLIST"; then
                NEEDS_BUMP=true
                break
              fi
            done
            if $NEEDS_BUMP; then
              echo "ERROR: Version check failed. VERSION file was not updated."
              echo "Changes detected in non-blocklisted files:"
              echo "$CHANGED_FILES" | grep -vE "$BLOCKLIST" | sed 's/^/  - /'
              echo ""
              echo "Update VERSION file before merging (current: $(git show "$HEAD_COMMIT:VERSION" 2>/dev/null || echo 'none'))."
              exit 1
            fi
          fi
          echo "Version check passed."

  deploy-dev:
    name: deploy to dev (PR preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test, lint, smoke-install, version-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --environment staging --service gleaming-light
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}

  deploy-prod:
    name: deploy to production
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main-with-dashboard') && github.event_name == 'push'
    needs: [test, lint, smoke-install, version-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --environment production --service gleaming-light
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}